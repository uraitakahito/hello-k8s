apiVersion: apps/v1
kind: Deployment
metadata:
  name: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-k8s
      variant: green
  template:
    metadata:
      labels:
        app: hello-k8s
        variant: green
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: web-server
          image: hello-k8s-web
          imagePullPolicy: Never
          args: ["green"]
          ports:
            - containerPort: 80
