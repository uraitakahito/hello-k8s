apiVersion: v1
kind: Service
metadata:
  # OrbStack: http://hello-k8s-green.hello-k8s.svc.cluster.local:8080
  name: hello-k8s-green
  namespace: hello-k8s
spec:
  type: NodePort
  selector:
    app: hello-kubernetes
    variant: green
  ports:
    - port: 8080
      targetPort: 80
      nodePort: 30081
